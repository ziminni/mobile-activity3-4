name: why
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0-93.1.beta

dependencies:
  flutter:
    sdk: flutter

  # reads svg icons
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
  - assets/icons/

  fonts:
      - family: CrimsonText
        fonts:
          - asset: fonts/CrimsonText-Bold.ttf
            weight: 700
          - asset: fonts/CrimsonText-Italic.ttf
            weight: 500
          - asset: fonts/CrimsonText-Regular.ttf
            weight: 600
          - asset: fonts/CrimsonText-SemiBold.ttf
            weight: 700
